<!DOCTYPE html>
<html>

<head>
<title>Track Complaint</title>

<style>
body{
font-family:Arial;
background:azure;
text-align:center;
padding-top:120px;
}

h2{
color:#0d99a3;
}

input{
padding:10px;
width:220px;
font-size:16px;
}

button{
padding:10px 15px;
background:#0d99a3;
color:white;
border:none;
cursor:pointer;
margin-left:5px;
}

button:hover{
background:#087b83;
}

#status{
margin-top:25px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<h2>Track Your Complaint</h2>

<input type="text" id="cid" placeholder="Enter Complaint ID">

<button onclick="track()">Check Status</button>

<p id="status"></p>

<!-- ✅ SCRIPT MUST BE HERE -->
<script>
function track(){

    var id = document.getElementById("cid").value;

    console.log("ID entered:", id); // DEBUG

    if(!id){
        alert("Enter Complaint ID first");
        return;
    }

    fetch("http://localhost:5000/complaint/" + id)
    .then(function(res){
        return res.json();
    })
    .then(function(result){

        console.log(result); // DEBUG

        if(result.success){
            document.getElementById("status").innerHTML =
            "Status: " + result.data.status;
        } else {
            document.getElementById("status").innerHTML =
            "❌ Complaint Not Found";
        }

    })
    .catch(function(){
        document.getElementById("status").innerHTML =
        "⚠️ Server not running";
    });
}
</script>

</body>
</html>
